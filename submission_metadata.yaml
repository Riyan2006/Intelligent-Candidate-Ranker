ai_usage_summary: |
  Claude was used extensively for architecture design, script writing, debugging,
  and code review throughout the pipeline. Gemini Flash (via Google AI API) was
  used as a component within the pipeline itself — for LLM rubric scoring of the
  top-500 candidates (Step 05) and pre-generating reasoning strings (Step 06).
  Voyage AI was used for text embeddings (Step 04). No API calls are made during
  the ranking step.

methodology_summary: |
  Four-signal fusion pipeline with offline pre-computation. (1) Voyage AI
  voyage-4-large embeddings (1024-dim) for all 100K candidates, cosine similarity
  to JD embedding as the semantic signal. (2) Gemini Flash LLM rubric scoring of
  top-500 candidates on 5 dimensions: technical depth, career trajectory, red flag
  check, shipping evidence, and overall fit. (3) Structured career features: must-have
  skill matching scanning both skills[] and career descriptions, company type scoring,
  production evidence detection, and keyword stuffer penalty. (4) Behavioral signals
  from all 23 redrob_signals fields across availability, responsiveness, market demand,
  and technical authenticity pillars. Honeypot detection via 3 mathematical impossibility
  signals applied as a 0.01x multiplier. Final fusion: 0.35 x embedding + 0.30 x LLM +
  0.20 x career features + 0.15 x behavioral. Entire ranking step runs in under 10
  seconds on CPU with no network access.

